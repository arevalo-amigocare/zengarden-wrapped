name: Weekly Points Extraction

on:
  schedule:
    # Every Sunday at 12pm ET
    # DST note: Change to '0 17 * * 0' after Nov 1, 2026 (when EST starts).
    #           Change back to '0 16 * * 0' after Mar 8, 2027 (when EDT resumes).
    - cron: '0 16 * * 0'  # 16:00 UTC = 12pm EDT (Mar–Nov) / 11am EST (Nov–Mar)
  workflow_dispatch:
    inputs:
      week_override:
        description: 'Week number to process (leave blank for auto-detect)'
        required: false
        type: string
      dry_run:
        description: 'Dry run — calculate points but do not save'
        required: false
        type: boolean
        default: false

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install slack_sdk

      - name: Run weekly extraction
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_USER_TOKEN: ${{ secrets.SLACK_USER_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.week_override }}" ]; then
            ARGS="--week ${{ inputs.week_override }}"
          fi
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python zen_garden_weekly_auto.py $ARGS

      - name: Commit and push results
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name "Zen Garden Bot"
          git config user.email "bot@amigocareaba.com"
          git add zen_garden_weekly.json run_status.json weekly_summary.txt weekly_reports/
          [ -f zen_garden_wrapped_data.json ] && git add zen_garden_wrapped_data.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            WEEK_LABEL=$(python -c "import json; d=json.load(open('run_status.json')); print(d.get('week_label','update'))")
            git commit -m "Weekly points: ${WEEK_LABEL}"
            git push
          fi

      # ── FAIL ALERT ────────────────────────────────────────────────
      # Runs ONLY if any previous step failed. Posts to private alerts channel.
      # Set SLACK_ALERT_WEBHOOK_URL in repo secrets to enable.
      - name: Post failure alert to Slack
        if: failure()
        env:
          ALERT_URL: ${{ secrets.SLACK_ALERT_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$ALERT_URL" ]; then
            echo "::warning::SLACK_ALERT_WEBHOOK_URL not set — skipping failure notification"
            exit 0
          fi
          MSG="⚠️ *Zen Garden weekly run failed*\\n\\nWorkflow: \`${{ github.workflow }}\`\\nTriggered by: \`${{ github.event_name }}\`\\nDate: $(date -u '+%Y-%m-%d %H:%M UTC')\\n\\n<${RUN_URL}|View the failed run on GitHub>"
          curl -s -X POST -H 'Content-Type: application/json' \
            --data "{\"text\":\"${MSG}\"}" \
            "$ALERT_URL" > /dev/null
          echo "Failure alert posted"
